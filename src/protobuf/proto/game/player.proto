syntax = "proto3";
package game;

import "common/item_data.proto";
import "common/player_data.proto";

// 心跳
message CHeartBeat {
}
message SHeartBeat {
    int64 timestamp = 1;
}

// 登录game，返回完整的用户数据
message CLoginGame {

}
message SLoginGame {
    UserProfile user_profile = 1;
}

// 登出
message CLogoutGame {

}
message SLogoutGame {

}

// 查看玩家信息
message CViewUserInfo {

}
message SViewUserInfo {

}

// 修改玩家名字
message CModifyName {
    string new_name = 1;
}
message SModifyName {

}

// 修改头像
message CModifyAvatar {
    int32 avatar = 1;
}
message SModifyAvatar {

}

// 绑定账号
message CBindAccount {
    int32 bind_type = 1;
    string bind_account = 2;
    string bind_openid = 3;
}
message SBindAccount {

}

// 设置上阵英雄
message CSetFightHero {
    int32 team_id = 1;
    int32 slot_id = 2;
    int32 card_id = 3;
}
message SSetFightHero {
    int32 old = 1;  // 旧的卡牌id
}

// 下阵英雄
message CUnsetFightHero {
    int32 team_id = 1;
    int32 slot_id = 2;
}
message SUnsetFightHero {
    int32 old = 1;
}

// 英雄升级
message CUpgradeHero {
    int32 card_id = 1;
}
message SUpgradeHero {
    int32 new_level = 1;    // 新的等级
    repeated common.Reward costs = 2;  // 消耗
    repeated common.Reward awards = 3; // 获得
}

// 英雄换肤
message CChangeHeroSkin {
    int32 hero_id = 1;  // 英雄id
    int32 skin_id = 2;  // 皮肤id
}
message SChangeHeroSkin {

}

// 切换当前使用的队伍
message CSwitchHeroTeam {
    int32 team_id = 1;
}
message SSwitchHeroTeam {
    int32 cur_hero_team = 1;
    map<int32, HeroTeam> hero_teams = 2;
}

// 更新引导
message CUpdateGuide {
    map<string, string> val_map = 1;
}
message SUpdateGuide {
}

message CEquipDiyFlag {
    int32 id = 1;
    bool cancel = 2;
}
message SEquipDiyFlag {

}

message CSetUserData {
    string custom_data = 1;
}
message SSetUserData {

}
