syntax = "proto3";
package game;

import "common/friend_data.proto";

// 获取好友列表
message CGetFriendList {

}
message SGetFriendList {
    repeated FriendUserInfo list = 1;
}

// 获取好友申请列表
message CGetApplyList {
    
}
message SGetApplyList {
    repeated ApplyInfo list = 1;
}

// 添加好友
message CAddFriend {
    string target = 1;
    FriendUserInfo user = 2;    // 申请者的信息
    string extra = 3;           // 扩展信息
}
message SAddFriend {

}

// 移除好友
message CRemoveFriend {
    string target = 1;
}
message SRemoveFriend {

}

// 添加好友回复
message CReplyAdd {
    string target = 1;
    uint32 result = 2;  // 1 同意， 2 拒绝
    FriendUserInfo user = 3;
}
message SReplyAdd {

}