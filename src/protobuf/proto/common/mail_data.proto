syntax = "proto3";
package common;

enum MailStatus {
    MAIL_STATUS_INVALID = 0;
    MAIL_STATUS_NEW = 1;        // 新邮件
    MAIL_STATUS_READED = 2;     // 已读
    MAIL_STATUS_CLAIMED = 3;    // 已领取
    MAIL_STATUS_DELETED = 4;    // 已删除
}

enum MailType {
    MAIL_TYPE_INVALID = 0;
    MAIL_TYPE_SYSTEM = 1;   // 系统邮件
    MAIL_TYPE_USER = 2;     // 用户邮件
}

// 邮件内容
message MailInfo {
    uint32 id = 1;              // 邮件id
    MailType mail_type = 2;     // 邮件类型
    MailStatus status = 3;      // 邮件状态
    string title = 4;           // 邮件主题
    string message = 5;         // 邮件文本内容
    string sender = 6;          // 发件人uid
    string receiver = 7;        // 收件人uid
    int64 expire = 8;           // 过期时间
    string extra = 9;           // 扩展信息，附件，发件人信息，收件人信息
    int64 timestamp = 10;       // 邮件发送时间
}
